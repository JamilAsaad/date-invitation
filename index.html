<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Date Invite</title>

  <!-- Cute Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Fredoka', sans-serif;
    }

    body {
      overflow: hidden;
      height: 100vh;
      background: linear-gradient(135deg, #ffd6e8, #ffeecf, #d7f7ff);
      position: relative;
    }

    .floating-hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -50px;
      color: rgba(255, 105, 180, 0.4);
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      to {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
      }
    }

    .page {
      width: 100%;
      height: 100vh;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .active {
      display: flex;
    }

    h1 {
      font-size: 3rem;
      color: #ff3d81;
      margin-bottom: 40px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.08);
    }

    .button-container {
      position: relative;
      width: 500px;
      height: 250px;
    }

    button {
      border: none;
      padding: 16px 34px;
      border-radius: 999px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    button:hover {
      transform: scale(1.08);
    }

    #yesBtn {
      background: #ff5c9f;
      color: white;
      position: absolute;
      left: 100px;
      top: 90px;
    }

    #noBtn {
      background: white;
      color: #ff5c9f;
      border: 2px solid #ff5c9f;
      position: absolute;
      left: 280px;
      top: 90px;
      user-select: none;
    }

    .card {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      max-width: 600px;
      width: 90%;
    }

    .inputs {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 30px;
    }

    input {
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #ffc3da;
      font-size: 1rem;
      outline: none;
    }

    #confirmBtn {
      background: #ff5c9f;
      color: white;
      margin-top: 15px;
      display: none;
    }

    #finalPage h1 {
      font-size: 2.7rem;
      line-height: 1.4;
    }

    .sparkle {
      position: absolute;
      font-size: 24px;
      animation: sparkle 2s infinite ease-in-out;
    }

    @keyframes sparkle {
      0%, 100% {
        transform: scale(1);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.5);
        opacity: 1;
      }
    }

    @media(max-width: 600px) {
      h1 {
        font-size: 2.1rem;
      }

      .button-container {
        width: 100%;
      }

      #yesBtn {
        left: 50px;
      }

      #noBtn {
        left: 200px;
      }
    }
  </style>
</head>
<body>

  <div class="floating-hearts" id="hearts"></div>

  <!-- PAGE 1 -->
  <div class="page active" id="page1">
    <div class="card">
      <h1>Jamil is asking you out on a Date! 💖</h1>

      <div class="button-container" id="buttonContainer">
        <button id="yesBtn">Yes 😍</button>
        <button id="noBtn">No 😭</button>
      </div>
    </div>
  </div>

  <!-- PAGE 2 -->
  <div class="page" id="page2">
    <div class="card">
      <h1>Damn, I thought you were going to say no 😂💕</h1>

      <div class="inputs">
        <input type="date" id="dateInput" />
        <input type="time" id="timeInput" />

        <button id="confirmBtn">Confirm Date 💌</button>
      </div>
    </div>
  </div>

  <!-- PAGE 3 -->
  <div class="page" id="finalPage">
    <div class="card">
      <h1 id="finalText">
        Awesome, I'll be there to pick you up at the chosen time - 30 mins! 🚗💕
      </h1>
    </div>
  </div>

  <script>
    // ----------------------
    // Floating Hearts
    // ----------------------
    const heartsContainer = document.getElementById('hearts');

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = ['💖','💕','💘','💝'][Math.floor(Math.random() * 4)];
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 25 + 20) + 'px';
      heart.style.animationDuration = (Math.random() * 6 + 6) + 's';

      heartsContainer.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 12000);
    }

    setInterval(createHeart, 500);

    // ----------------------
    // No Button Escape Logic
    // ----------------------
    const noBtn = document.getElementById('noBtn');
    const container = document.getElementById('buttonContainer');

    function moveNoButton() {
      const maxX = container.clientWidth - noBtn.offsetWidth;
      const maxY = container.clientHeight - noBtn.offsetHeight;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      noBtn.style.left = randomX + 'px';
      noBtn.style.top = randomY + 'px';
    }

    // desktop hover
    noBtn.addEventListener('mouseover', moveNoButton);

    // mobile / touch support
    noBtn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      moveNoButton();
    }, { passive: false });

    // fallback for pointer devices (modern phones + tablets)
    noBtn.addEventListener('pointerenter', moveNoButton);

    noBtn.addEventListener('click', (e) => {
      e.preventDefault();
    });

    // ----------------------
    // Page Navigation
    // ----------------------
    const yesBtn = document.getElementById('yesBtn');
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const finalPage = document.getElementById('finalPage');

    yesBtn.addEventListener('click', () => {
      page1.classList.remove('active');
      page2.classList.add('active');
    });

    // ----------------------
    // Show Confirm Button
    // ----------------------
    const dateInput = document.getElementById('dateInput');
    const timeInput = document.getElementById('timeInput');
    const confirmBtn = document.getElementById('confirmBtn');

    function checkFields() {
      if(dateInput.value && timeInput.value) {
        confirmBtn.style.display = 'inline-block';
      }
    }

    dateInput.addEventListener('change', checkFields);
    timeInput.addEventListener('change', checkFields);

    // ----------------------
    // EmailJS Setup
    // ----------------------
    // Replace these with your EmailJS credentials
    const EMAILJS_PUBLIC_KEY = 'pHk91KThpSfJFAySl';
    const EMAILJS_SERVICE_ID = 'service_rq2z6r9';
    const EMAILJS_TEMPLATE_ID = 'template_2kc0ny6';
    
    emailjs.init({
      publicKey: EMAILJS_PUBLIC_KEY,
    });

    // ----------------------
    // Confirm & Send Email
    // ----------------------
    confirmBtn.addEventListener('click', async () => {
      const selectedDate = dateInput.value;
      const selectedTime = timeInput.value;

      // compute adjusted time BEFORE sending email
      const [hours, minutes] = selectedTime.split(':').map(Number);
      const dateObj = new Date();
      dateObj.setHours(hours);
      dateObj.setMinutes(minutes - 30);

      const adjustedTime = dateObj.toTimeString().slice(0,5);

      function launchConfetti() {
        const duration = 2000;
        const end = Date.now() + duration;

        (function frame() {
          const confetti = document.createElement('div');
          confetti.style.position = 'fixed';
          confetti.style.width = '10px';
          confetti.style.height = '10px';
          confetti.style.backgroundColor = ['#ff5c9f','#ffd166','#06d6a0','#118ab2','#ef476f'][Math.floor(Math.random()*5)];
          confetti.style.left = Math.random() * window.innerWidth + 'px';
          confetti.style.top = '-10px';
          confetti.style.zIndex = '9999';
          document.body.appendChild(confetti);

          let pos = 0;
          const fall = setInterval(() => {
            pos += 5;
            confetti.style.top = pos + 'px';
            if (pos > window.innerHeight) {
              confetti.remove();
              clearInterval(fall);
            }
          }, 16);

          if (Date.now() < end) requestAnimationFrame(frame);
        })();
      }

      try {
        const result = await emailjs.send(
          EMAILJS_SERVICE_ID,
          EMAILJS_TEMPLATE_ID,
          {
            to_email: 'jassaad768@gmail.com',
            selected_date: selectedDate,
            selected_time: selectedTime,
            message: `Date confirmed for ${selectedDate} at ${selectedTime}`,
          }
        );

        console.log('EmailJS success:', result);

        document.getElementById('finalText').innerHTML =
          `Awesome, I'll be there to pick you up at ${adjustedTime}! 🚗💕`;

        page2.classList.remove('active');
        finalPage.classList.add('active');

        launchConfetti();

      } catch (error) {
        console.error('EmailJS error:', error);
        alert('Email sending failed (check EmailJS configuration + template variables).');
      }
    });
  </script>

</body>
</html>
